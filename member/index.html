<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOW FITNESS 會員登入 | Member Login</title>
  <meta http-equiv="refresh" content="0; url=https://member-wow.lovable.app">
  <link rel="canonical" href="https://member-wow.lovable.app">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      padding: 2rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #fff;
      margin-bottom: 1rem;
    }
    .logo span {
      color: #ec4899;
    }
    .message {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #ec4899;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: transparent;
      border: 2px solid #ec4899;
      color: #ec4899;
      text-decoration: none;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #ec4899;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">WOW <span>FITNESS</span></div>
    <div class="spinner"></div>
    <p class="message">正在跳轉至會員系統...<br>Redirecting to Member Portal...</p>
    <a href="https://member-wow.lovable.app" class="btn">立即前往 / Go Now</a>
  </div>
  <script>
    window.location.replace("https://member-wow.lovable.app");
  </script>
</body>
</html>
